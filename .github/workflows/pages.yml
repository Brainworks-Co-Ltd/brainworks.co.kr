name: Deploy Next.js static export to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show config
        run: |
          echo "===== next.config.js ====="
          cat next.config.js
          echo "===== package.json ====="
          cat package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Check static export output
        run: |
          echo "===== root ====="
          ls -la

          echo "===== out ====="
          ls -la out || true

          if [ ! -f out/index.html ]; then
            echo "::error::out/index.html 파일이 없습니다. next.config.js의 output: 'export' 적용 여부와 서버 전용 기능 사용 여부를 확인하세요."
            exit 1
          fi

      - name: Add nojekyll
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
